#仅个人打包使用
name: Build IPA on Windows Request

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.0.1.app

      - name: Find and Build Project
        run: |
          # 自动在仓库里寻找 .xcodeproj 文件的实际路径
          PROJECT_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          if [ -z "$PROJECT_PATH" ]; then
            echo "错误：未找到任何 Xcode 项目文件！"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          PROJECT_NAME=$(basename "$PROJECT_PATH")
          echo "寻找到项目文件: $PROJECT_PATH, 切换至目录: $PROJECT_DIR"
          
          cd "$PROJECT_DIR"
          
          # 执行编译，自动获取正确的 Scheme
          SCHEME_NAME=$(xcodebuild -list -json | plutil -extract convert json - -o - | jq -r '.project.schemes[0]' 2>/dev/null || echo "Darock-Bili")
          echo "使用 Scheme: $SCHEME_NAME"
          
          xcodebuild clean build -project "$PROJECT_NAME" -scheme "$SCHEME_NAME" -configuration Release CODE_SIGNING_ALLOWED=NO

      - name: Package into IPA
        run: |
          mkdir -p Payload
          # 智能兼容 DerivedData 路径提取编译产物
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | grep -v "Watch" 2>/dev/null | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "错误：未生成任何 .app 编译产物！"
            exit 1
          fi
          
          echo "正在打包应用: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r Darock-Bili.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Darock-Bili-Unsigned-IPA
          path: Darock-Bili.ipa
