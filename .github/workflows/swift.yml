name: Build IPA on Windows Request

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode 16 (Swift 6.0)
        run: |
          LATEST_XCODE=$(find /Applications -name "Xcode_16*.app" | sort -V | tail -n 1)
          if [ -z "$LATEST_XCODE" ]; then
            LATEST_XCODE="/Applications/Xcode.app"
          fi
          echo "使用环境: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"

      - name: Find and Clean Package Dependencies
        run: |
          PROJECT_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          cd "$PROJECT_DIR"
          
          echo "清理旧依赖锁..."
          rm -rf ./**/xcshareddata/swiftpm/Package.resolved
          xcodebuild -resolvePackageDependencies -project "$(basename "$PROJECT_PATH")"

      - name: Build for iOS/Watch
        run: |
          PROJECT_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          PROJECT_NAME=$(basename "$PROJECT_PATH")
          
          cd "$PROJECT_DIR"
          
          echo "=== 正在使用精准 Scheme [MeowBili] 进行编译 ==="
          xcodebuild clean build -project "$PROJECT_NAME" -scheme "MeowBili" -configuration Release CODE_SIGNING_ALLOWED=NO -disableAutomaticPackageResolution

      - name: Package into IPA
        run: |
          mkdir -p Payload
          # 提取编译生成的手机端主 App 壳
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "MeowBili.app" -type d 2>/dev/null | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "MeowBili.app" -type d | head -n 1)
          fi
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | grep -v -i "xctest" 2>/dev/null | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "错误：未生成任何 .app 编译产物！"
            exit 1
          fi
          
          echo "正在打包应用: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r Darock-Bili.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Darock-Bili-Unsigned-IPA
          path: Darock-Bili.ipa
