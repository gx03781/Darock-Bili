#仅个人打包使用
name: Build IPA on Windows Request

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.0.app

      - name: Build for iOS/Watch
        run: |
          xcodebuild clean build -project Darock-Bili.xcodeproj -scheme "Darock-Bili" -configuration Release CODE_SIGNING_ALLOWED=NO

      - name: Package into IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/*.app Payload/ 2>/dev/null || cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Darock-Bili.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Darock-Bili-Unsigned-IPA
          path: Darock-Bili.ipa
